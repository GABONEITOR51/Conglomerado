<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte de Proveedor (lite) · 805 MultiServices</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#fff;
    color:#000;
    font-family:"Courier New",Consolas,monospace;
    font-size:11px;
    line-height:1.3;
  }
  .sheet{
    width:100%;
    max-width:8.5in;
    margin:0 auto;
    padding:0.35in;
  }
  h1{font-size:14px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.5px}
  .sub{font-size:11px;margin:0 0 10px}
  /* ==== STATEMENT VIAMERICAS (tabla superior, nombres del proveedor) ==== */
  .stmt{display:flex;border:1.5px solid #000;margin:0 0 6px;break-inside:avoid;
        -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stmt-col{flex:1;border-right:1px solid #000;min-width:0;display:flex;flex-direction:column}
  .stmt-col:last-child{border-right:none}
  /* v27.1: las 3 columnas tienen distinto numero de filas. El bloque .stmt-total
     se empuja al fondo con margin-top:auto para que los tres "Total" queden
     alineados en la ultima linea del recuadro. */
  .stmt-total{margin-top:auto}
  .stmt-h{text-align:center;font-weight:bold;font-size:12px;padding:5px 4px;
          border-bottom:1.5px solid #000;letter-spacing:.3px}
  .stmt-col.bal .stmt-h{color:#8a8a8a}
  .stmt table{width:100%;border-collapse:collapse;margin:0;table-layout:fixed}
  .stmt td{padding:3px 5px;font-size:11px;vertical-align:baseline;border:none}
  .stmt td.c{text-align:left;white-space:normal;word-break:break-word}
  .stmt td.n{text-align:right;width:34px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .stmt td.a{text-align:right;width:88px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .stmt tr.bold td{font-weight:bold}
  .stmt tr.sep td{border-top:1px solid #000}
  .stmt tr.red td{color:#d00}
  .stmt tr.hl td{background:#dbe7ff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stmt-note{font-size:9px;font-style:italic;margin:0 0 14px;line-height:1.3}
  /* ===================================================================== */
  .groups{margin:0 0 14px}
  .grupo{border:1.5px solid #000;margin-bottom:7px;break-inside:avoid}
  .grupo .ghdr{display:flex;justify-content:space-between;align-items:baseline;
    background:#e6e6e6;padding:3px 6px;font-weight:bold;font-size:12px;
    text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #000;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .grupo .ghdr .gt{font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  .grupo .grow{display:grid;grid-template-columns:1fr 120px;column-gap:12px;padding:1px 6px}
  .grupo .grow span:last-child{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .grupo .grow.l1 span:first-child{padding-left:10px}
  .grupo .grow.l2 span:first-child{padding-left:24px;font-size:10px}
  .grupo .grow.l2 span:last-child{font-size:10px}
  .leyenda{font-size:9px;font-style:italic;line-height:1.25;margin-top:1px}
  .sec{margin-bottom:14px;break-inside:avoid}
  .sec h2{
    font-size:12px;margin:0;padding:2px 0;
    border-bottom:1px solid #000;text-transform:uppercase;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .sec .cnt{font-weight:normal;font-size:10px}
  .sec h2 .tot{font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  .sec h3.sub2{
    font-size:11px;margin:7px 0 0;padding:1px 0;
    border-bottom:1px dashed #000;text-transform:uppercase;font-weight:bold;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .sec h3.sub2 .tot{font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  table{width:100%;border-collapse:collapse;margin-top:2px;table-layout:fixed}
  th,td{padding:1px 3px;text-align:left;vertical-align:top;border-bottom:1px dotted #999;
        overflow:hidden;text-overflow:ellipsis}
  th{font-weight:bold;border-bottom:1px solid #000}
  td.r,th.r{text-align:right;white-space:nowrap}
  td.nw,th.nw{white-space:nowrap}
  td.name{white-space:normal;word-break:break-word}
  .empty{padding:4px 0;font-style:italic}
  .print-btn{
    position:fixed;right:14px;bottom:14px;
    background:#000;color:#fff;border:none;border-radius:4px;
    padding:8px 14px;font-size:12px;cursor:pointer;
  }
  @page{size:letter portrait;margin:0.35in}
  @media print{
    .print-btn{display:none}
    thead{display:table-header-group}
    tr{break-inside:avoid}
    .sec{break-inside:avoid}
  }
</style>

<body>
<div class="sheet" id="sheet"></div>
<button class="print-btn" onclick="window.print()">Imprimir / PDF</button>
<script>
/* =====================================================================
   REPORTE DE PROVEEDOR (lite) - v27
   ---------------------------------------------------------------------
   Contrato de datos (compatible con la misma Action de AppSheet):
     #d=HEADER||VENTAS||SALIDAS||CHEQUES||CANCELACIONES||PAGOS
     sec sep: ||   fila sep: ~~   campo sep: ^

   HEADER: 0 proveedor 1 fechaIni 2 fechaFin 3 logoURL(ignorado)
           4..8 totales legacy (IGNORADOS: se recalculan en JS)
           9 generadoPor
           10 balanceInicial (saldo final del periodo anterior)  [opcional]
           11 debitosManuales (SOLO ajustes que NO son cancelaciones TCD) [opcional]

   VENTAS/SALIDAS/CHEQUES/CANC: 0 fecha 1 hora 2 cliente 3 servicio
                                4 formaPago 5 monto 6 observacion 7 tipoEnvio
   PAGOS: 0 fecha 1 referencia 2 monto 3 formaPago 4 observacion

   =====================================================================
   MODELO CANONICO (v27) - VALIDADO CONTRA EL STATEMENT REAL DE JULIO 2026
   ---------------------------------------------------------------------
   Toda linea del statement de Viamericas se deriva de TRES EJES ORTOGONALES
   aplicados a cada movimiento:

     eje PRODUCTO     : 'mt' (money transfer) | 'bill' (bill payment)   <- campo [TipoEnvio] idx 7
     eje LIQUIDACION  : 'card' (TCD) | 'cash' (todo lo demas)           <- campo [FormaPago]  idx 4
     eje SIGNO        : 'alta' (VENTAS) | 'canc' (CANCELACIONES)        <- seccion del payload

   Derivacion de las 6 lineas:
     Money Transfers            = VENTAS, producto=mt
     Money Transfers - Canceled = CANC,   producto=mt
     Bill Payment               = VENTAS, producto=bill
     Bill Payment Canceled      = CANC,   producto=bill
     Credits  (se RESTA)        = VENTAS, liquidacion=card
     Debits   (se SUMA)         = CANC,   liquidacion=card   <-- BUG CORREGIDO EN v27

   INVARIANTE: toda transaccion TCD tiene efecto NETO CERO sobre el saldo a
   depositar, tanto al alta como a la cancelacion:
     alta : +Total (MT)          - Total (Credits) = 0
     canc : -Total (MT-Canceled) + Total (Debits)  = 0
   Cada periodo cierra de forma INDEPENDIENTE. No hay acoplamiento temporal:
   una venta TCD de junio cancelada en julio cuadra en ambos meses por separado.

   PRUEBA (statement Viamericas 07/01/2026 - 07/09/2026):
     Money Transfers - Canceled: A28934--1652  07/01/2026  $-200.00
     Debits - Charges: 363707208 07/01/2026
                       "CANCEL TX# A28934--1652 PAID BY DEBIT CARD"  $200.00
     Las otras 2 cancelaciones del periodo (1667 $-2,040 y 1666 $-111) NO
     generan debito: fueron pagadas en efectivo.
     Balance: 4,896.52 + 31,412.06 + 105.46 - 1,159.54 - 17,800.00
              + 200.00 - 3,145.00 = 14,509.50 = "Total To Deposit" [OK]
     Credits = {1674:400, 1683:210, 1698:1522.50, 1709:1012.50} = 3,145.00
     y las 4 aparecen TAMBIEN en Money Transfers -> Credits es un SUBCONJUNTO
     de MT, no una seccion paralela.

   REQUISITOS DE DATOS (criticos):
     1. El campo monto (idx 5) debe ser el TOTAL cobrado (envio + fee + taxes).
        Viamericas debita/acredita el TOTAL: TX 1652 = 190.00 + 10.00 = 200.00
        TX 1674 = 388.50 + 11.50 = 400.00. Si guardas solo el envio, todas las
        lineas Credits/Debits quedan cortas por el fee.
     2. HEADER[11] (debitos manuales) es SOLO para ajustes que NO son
        cancelaciones TCD (chargebacks, multas, correcciones). Las
        cancelaciones TCD ya se calculan solas: escribirlas a mano DUPLICA.
   ===================================================================== */
const SEC='||', REC='~~', F='^';
const DEMO_H = ["VIAMERICAS","1/7/2026","9/7/2026","","0","0","0","0","0","805 MultiServices","4896.52",""];
const DEMO_VENTAS=[
  ["7/3/2026","10:12 AM","MARTINEZ SAUL","ENVIO/","TCD","400","tx 1674","Money Transfer"],
  ["7/4/2026","11:03 AM","FRANCISCO JOSE","ENVIO/","TCD","210","tx 1683","Money Transfer"],
  ["7/8/2026","2:41 PM","VICENTE TAPIA","ENVIO/","TCD","1522.50","tx 1698","Money Transfer"],
  ["7/8/2026","4:02 PM","CORDOVA OSCAR","ENVIO/","TCD","1012.50","tx 1709","Money Transfer"],
  ["7/1/2026","9:30 AM","JESUS GONZALEZ ROMERO","ENVIO/","EFECTIVO","82.50","PG&E","Bill Paymnt"],
  ["7/3/2026","1:15 PM","MINERVA CARRILLO ESPINO","ENVIO/","EFECTIVO","22.96","TJX","Bill Paymnt"]
];
const DEMO_SALIDAS=[];
const DEMO_CHEQUES=[
  ["7/1/2026","","CP - DEPOSIT VC2","CHEQUE","EFECTIVO","1008.47",""],
  ["7/7/2026","","CP - DEPOSIT VC2","CHEQUE","EFECTIVO","151.07",""]
];
const DEMO_CANC=[
  ["7/1/2026","10:05 AM","FRANCISCO JOSE","CANCELACION","TCD","200","cancel tx 1652 (venta de JUNIO)","Money Transfer"],
  ["7/4/2026","3:20 PM","GABRIEL HERNANDEZ","CANCELACION","EFECTIVO","111","cancel tx 1666","Money Transfer"],
  ["7/8/2026","5:44 PM","NICOLAS CARRILLO","CANCELACION","EFECTIVO","2040","cancel tx 1667","Money Transfer"]
];
const DEMO_PAGOS=[
  ["7/1/2026","BAI Deposit Agent - ATM","3600.00","ATM",""],
  ["7/6/2026","BAI Deposit Agent - ATM","3500.00","ATM",""],
  ["7/7/2026","DIRECT BANK ATM","6500.00","ATM",""],
  ["7/8/2026","SMS Deposit Agent - ATM","4200.00","ATM",""]
];
function smartDecode(raw){
  let s=raw;
  try{ s=decodeURIComponent(raw); }catch(e){ s=raw; }
  if(s.indexOf(SEC)===-1 && /%[0-9A-Fa-f]{2}/.test(s)){
    try{ s=decodeURIComponent(s); }catch(e){}
  }
  return s;
}
function splitRows(sectionStr){
  const t=(sectionStr||"").trim();
  if(!t) return [];
  return t.split(REC).map(s=>s.trim()).filter(s=>s!=="").map(r=>r.split(F));
}
function readPayload(){
  let raw="";
  const h=location.hash||"";
  if(h.indexOf("#d=")===0) raw=h.slice(3);
  else if(new URLSearchParams(location.search).get("d")) raw=new URLSearchParams(location.search).get("d");
  if(!raw) return null;
  raw=smartDecode(raw);
  const parts=raw.split(SEC);
  const H=(parts[0]||"").split(F);
  return {
    H,
    VENTAS: splitRows(parts[1]),
    SALIDAS: splitRows(parts[2]),
    CHEQUES: splitRows(parts[3]),
    CANC: splitRows(parts[4]),
    PAGOS: splitRows(parts[5])
  };
}
function toNum(v){
  if(v===undefined||v===null) return 0;
  const n=parseFloat((""+v).replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:n;
}
function sumRows(rows,idx){
  if(!rows||!rows.length) return 0;
  return rows.reduce((a,r)=>a+toNum(r[idx]),0);
}
function money(v){return "$"+toNum(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
/* money2: signo menos ANTES del $, CON centavos (v27: antes redondeaba a entero,
   lo que hacia que la tabla no cuadrara al sumar a mano contra bTot).
   Si el valor es 0 devuelve "" (celda en blanco, igual que el statement). */
function money2(v){
  const n=toNum(v);
  if(Math.abs(n)<0.005) return "";
  return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s){return (s==null?"":""+s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function stripQuote(s){return (s==null?"":(""+s)).replace(/^['`´‘’]+/,'').trim();}
function cleanDT(s){return (s==null?"":(""+s)).replace(/^[^\d]+/,'').trim();}
function nameObs(name,obs){
  const n=esc(name||'');
  const o=(obs==null?'':(''+obs)).trim();
  return o ? n+' / '+esc(o) : n;
}
function cut(s,n){s=stripQuote(s); return s.length>n?s.slice(0,n):s;}

/* =====================================================================
   EJES CANONICOS DE CLASIFICACION
   ===================================================================== */

/* Forma de pago "TCD" = PAGO DIRECTO CLIENTE A COMPANIA (CARD):
   el cliente paga con su propia tarjeta en la terminal del proveedor.
   Reconoce el codigo "TCD" y la descripcion larga (con o sin emoji/tildes). */
function esTCD(fp){
  fp=(fp==null?'':(''+fp)).toLowerCase();
  return /\btcd\b|pago directo cliente|cliente\s*directo|directo a compa/.test(fp);
}
/* Eje PRODUCTO: usa SOLO [TipoEnvio] (idx 7).
   OJO: [Servicio] (idx 3) llega como "ENVIO/" para TODO (envios, biles y
   creditos), asi que NO sirve para distinguir. */
function ejeProducto(r){ return /bill/.test((''+(r[7]||'')).toLowerCase()) ? 'bill' : 'mt'; }
/* Eje LIQUIDACION: como se liquida con el proveedor. */
function ejeLiquid(r){ return esTCD(r[4]) ? 'card' : 'cash'; }
/* Monto normalizado: SIEMPRE positivo.
   Sin esto, un monto negativo capturado en CANC invierte el signo dos veces
   y rompe a la vez la linea "Cancelados" y la linea "Debitos". */
function montoAbs(r){ return Math.abs(toNum(r[5])); }
/* Agregador generico por ejes. prod/liq = null -> no filtra por ese eje.
   O(n) por llamada; O(V+C) total sobre las 6 lineas. */
function agrupa(rows,prod,liq){
  const s=(rows||[]).filter(r =>
    (!prod || ejeProducto(r)===prod) && (!liq || ejeLiquid(r)===liq));
  return { n:s.length, s:s.reduce((a,r)=>a+montoAbs(r),0), rows:s };
}

/* ---- Clasificadores de presentacion (secciones de detalle) ---- */
function ventaTipo(r){
  if(ejeLiquid(r)==='card') return 'credito';
  return ejeProducto(r)==='bill' ? 'bill' : 'envio';
}
function cancTipo(r){ return ejeLiquid(r)==='card' ? 'tarjeta' : 'otra'; }

/* =====================================================================
   TABLAS DE DETALLE
   ===================================================================== */
const COLS_A=`<colgroup>
  <col style="width:18%">
  <col style="width:53%">
  <col style="width:9%">
  <col style="width:8%">
  <col style="width:12%">
</colgroup>`;
function tablaTipoA(rows){
  if(!rows.length) return `<div class="empty">Sin movimientos</div>`;
  const trs=rows.map(r=>`<tr>
    <td class="nw">${esc(cleanDT(r[0]))} ${esc(cleanDT(r[1]))}</td>
    <td class="name">${nameObs(r[2],r[6])}</td>
    <td class="nw">${esc(cut(r[3],6))}</td>
    <td class="nw">${esc(cut(r[4],5))}</td>
    <td class="r">${money(montoAbs(r))}</td>
  </tr>`).join("");
  return `<table>
    ${COLS_A}
    <thead><tr><th class="nw">Fecha/Hora</th><th>Cliente / Obs.</th><th>Servicio</th><th>F.Pago</th><th class="r">Monto</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}
function sumAbs(rows){ return (rows||[]).reduce((a,r)=>a+montoAbs(r),0); }
function subBloque(titulo,rows){
  return `<h3 class="sub2"><span>${titulo} <span class="cnt">(${rows.length} mov.)</span></span><span class="tot">${money(sumAbs(rows))}</span></h3>${tablaTipoA(rows)}`;
}
function ventasBloques(rows){
  const env =rows.filter(r=>ventaTipo(r)==='envio');
  const bil =rows.filter(r=>ventaTipo(r)==='bill');
  const cred=rows.filter(r=>ventaTipo(r)==='credito');
  if(env.length===0 && bil.length===0 && cred.length===0) return tablaTipoA(rows);
  let html=subBloque('Envios (Money Transfer)',env)+subBloque('Pago de biles (Bill Payment)',bil);
  if(cred.length) html+=subBloque('Creditos (cliente directo a compania)',cred);
  return html;
}
function cancBloques(rows){
  const tar=rows.filter(r=>cancTipo(r)==='tarjeta');
  const otr=rows.filter(r=>cancTipo(r)==='otra');
  if(tar.length===0) return tablaTipoA(rows);
  let html=subBloque('Debito por cancelacion de tarjeta (TCD)',tar);
  if(otr.length) html+=subBloque('Cancelaciones (efectivo / otras)',otr);
  return html;
}
function tablaPagos(rows){
  if(!rows.length) return `<div class="empty">Sin pagos registrados</div>`;
  const trs=rows.map(r=>`<tr>
    <td class="nw">${esc(cleanDT(r[0]))}</td>
    <td class="name">${nameObs(r[1],r[4])}</td>
    <td class="nw">${esc(cut(r[3],5))}</td>
    <td class="r">${money(Math.abs(toNum(r[2])))}</td>
  </tr>`).join("");
  return `<table>
    <colgroup>
      <col style="width:18%"><col style="width:62%"><col style="width:8%"><col style="width:12%">
    </colgroup>
    <thead><tr><th class="nw">Fecha</th><th>Referencia / Obs.</th><th>F.Pago</th><th class="r">Monto</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

/* =====================================================================
   STATEMENT VIAMERICAS (tabla superior)
   ===================================================================== */
function stRowA(concepto,cant,monto,cls){
  cls=cls||'';
  const c=(cant===null||cant===undefined||cant===0)?'':(''+cant);
  return `<tr class="${cls}"><td class="c">${concepto}</td><td class="n">${c}</td><td class="a">${money2(monto)}</td></tr>`;
}
function stRowB(concepto,monto,cls){
  cls=cls||'';
  return `<tr class="${cls}"><td class="c">${concepto}</td><td class="a">${money2(monto)}</td></tr>`;
}
function statementTable(S,T,balIni,balIniSet,debManual,debSet){
  /* ---- Columna 1: Envios De Dinero (Money Transfers) ---- */
  const subN=S.mtAlta.n-S.mtCanc.n, subA=S.mtAlta.s-S.mtCanc.s;
  const totN=subN, totA=subA;              // Pago de Envios / Anulados = 0 (sin fuente)
  /* ---- Columna 2: Otros Servicios ---- */
  const otrN=S.bilAlta.n-S.bilCanc.n, otrA=S.bilAlta.s-S.bilCanc.s;
  /* ---- Columna 3: Balance ----
     Inicial + MT + Otros - Cheques - Depositos + Debitos - Creditos */
  const bEnv=totA, bOtr=otrA;
  const bChq=-T.cheques, bDep=-T.pagos;
  const bDeb=S.debits.s+debManual;         // <-- v27: cancelaciones TCD + ajustes manuales
  const bCred=-S.credits.s;
  const bTot=toNum(balIni)+bEnv+bOtr+bChq+bDep+bDeb+bCred;
  const col1=`<div class="stmt-col">
    <div class="stmt-h">Envíos De Dinero</div>
    <table>
      ${stRowA('Envíos De Dinero',S.mtAlta.n,S.mtAlta.s)}
      ${stRowA('Envíos De Dinero - Cancelados',S.mtCanc.n?(-S.mtCanc.n):0,-S.mtCanc.s)}
      ${stRowA('Envíos De Dinero - Anulados',0,0,'red')}
      ${stRowA('Subtotal',subN,subA,'bold sep')}
      ${stRowA('Pago de Envíos',0,0,'red')}
    </table>
    <table class="stmt-total">
      ${stRowA('Total',totN,totA,'bold sep')}
    </table>
  </div>`;
  const col2=`<div class="stmt-col">
    <div class="stmt-h">Otros Servicios</div>
    <table>
      ${stRowA('Pago de Biles',S.bilAlta.n,S.bilAlta.s)}
      ${stRowA('Pagos de Biles Cancelados',S.bilCanc.n?(-S.bilCanc.n):0,-S.bilCanc.s)}
      ${stRowA('Pago de Biles Int.',0,0,'red')}
      ${stRowA('Money Orders',0,0,'red')}
      ${stRowA('Recargas / Pin',0,0,'red')}
      ${stRowA('Recargas Canceladas',0,0,'red')}
    </table>
    <table class="stmt-total">
      ${stRowA('Total',otrN,otrA,'bold sep')}
    </table>
  </div>`;
  const col3=`<div class="stmt-col bal">
    <div class="stmt-h">Balance</div>
    <table>
      ${stRowB('Balance Inicial',balIni,balIniSet?'':'red')}
      ${stRowB('Envíos De Dinero',bEnv)}
      ${stRowB('Otros Servicios',bOtr)}
      ${stRowB('Cheques Acreditados',bChq)}
      ${stRowB('Depósitos / Viasafe',bDep,'hl')}
      ${stRowB('Débitos',bDeb,(debSet||S.debits.n>0)?'':'red')}
      ${stRowB('Créditos',bCred)}
    </table>
    <table class="stmt-total">
      ${stRowB('Total',bTot,'bold sep')}
    </table>
  </div>`;
  const notaDeb = S.debits.n>0
    ? `<b>Débitos</b> = ${S.debits.n} cancelación(es) pagada(s) con tarjeta (TCD) por ${money(S.debits.s)}${debManual?` + ${money(debManual)} de ajuste manual`:''}: revierten el crédito de la venta original.`
    : `<b>Débitos</b>: sin cancelaciones TCD en el periodo.`;
  return `<div class="stmt">${col1}${col2}${col3}</div>
  <div class="stmt-note">Statement de proveedor (Viamericas) &middot; v27. <b style="color:#d00">Valores en rojo</b> = sin dato en el reporte: editar manualmente. Balance Inicial = saldo final del periodo anterior. Cheques Acreditados y Depósitos/Viasafe son abonos (restan al saldo a depositar). ${notaDeb}</div>`;
}

/* ===================================================================== */
function pad2(n){n=parseInt(n,10)||0; return (n<10?'0':'')+n;}
function fileDate(s){
  s=cleanDT(s);
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return s.replace(/[^\w-]/g,'');
  return pad2(m[1])+'-'+pad2(m[2])+'-'+m[3];
}
function fileProv(s){
  s=(""+(s||'')).trim();
  const t=s.replace(/[^A-Za-zÀ-ÿ]/g,'').slice(0,3);
  return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase();
}
function render(P){
  const H=P.H, g=i=>H[i]!==undefined?H[i]:"";

  /* ---- DERIVACION DE LAS 6 LINEAS DEL STATEMENT (modelo de 3 ejes) ---- */
  const S={
    mtAlta : agrupa(P.VENTAS,'mt',  null),
    mtCanc : agrupa(P.CANC,  'mt',  null),
    bilAlta: agrupa(P.VENTAS,'bill',null),
    bilCanc: agrupa(P.CANC,  'bill',null),
    credits: agrupa(P.VENTAS, null,'card'),   // se RESTA
    debits : agrupa(P.CANC,   null,'card')    // se SUMA
  };

  /* ---- Totales de las secciones de detalle ---- */
  const T={
    ventas:    sumAbs(P.VENTAS),
    ventasEnv: sumAbs(P.VENTAS.filter(r=>ventaTipo(r)==='envio')),
    ventasBil: sumAbs(P.VENTAS.filter(r=>ventaTipo(r)==='bill')),
    ventasCred:S.credits.s,
    salidas:   sumAbs(P.SALIDAS),
    cheques:   sumAbs(P.CHEQUES),
    canc:      sumAbs(P.CANC),
    cancTar:   S.debits.s,
    cancOtra:  sumAbs(P.CANC.filter(r=>cancTipo(r)==='otra')),
    pagos:     (P.PAGOS||[]).reduce((a,r)=>a+Math.abs(toNum(r[2])),0)
  };

  /* Balance Inicial (idx 10) y Debitos manuales (idx 11): opcionales. */
  const balIniSet = H[10]!==undefined && (''+H[10]).trim()!=='';
  const balIni    = toNum(H[10]);
  const debSet    = H[11]!==undefined && (''+H[11]).trim()!=='';
  const debManual = toNum(H[11]);

  document.title = `${fileProv(g(0))}_${fileDate(g(1))}_${fileDate(g(2))}`;
  document.getElementById("sheet").innerHTML=`
  <h1>Reporte de proveedor: ${esc(g(0)||'PROVEEDOR')}</h1>
  <div class="sub">805 MultiServices &middot; Periodo: ${esc(cleanDT(g(1)))} a ${esc(cleanDT(g(2)))} &middot; Generado por: ${esc(g(9)||'-')} &middot; v27</div>
  ${statementTable(S,T,balIni,balIniSet,debManual,debSet)}
  <div class="groups">
    <div class="grupo">
      <div class="ghdr"><span>Entradas &middot; Ventas (+)</span><span class="gt">${money(T.ventas)}</span></div>
      <div class="grow l1"><span>Envios (Money Transfer)</span><span>${money(T.ventasEnv)}</span></div>
      <div class="grow l1"><span>Pago de biles (Bill Payment)</span><span>${money(T.ventasBil)}</span></div>
      ${T.ventasCred>0 ? `<div class="grow l1"><span>Creditos TCD (cliente directo) &rarr; se resta en Balance</span><span>${money(T.ventasCred)}</span></div>` : ``}
    </div>
    <div class="grupo">
      <div class="ghdr"><span>Salidas &middot; Abonos (&minus;)</span><span class="gt">${money(T.cheques+T.canc)}</span></div>
      <div class="grow l1"><span>Cheques acreditados</span><span>${money(T.cheques)}</span></div>
      <div class="grow l1"><span>Cancelaciones</span><span>${money(T.canc)}</span></div>
      ${T.cancTar>0 ? `
      <div class="grow l2"><span>Con tarjeta (TCD) &rarr; genera Debito de igual monto</span><span>${money(T.cancTar)}</span></div>
      <div class="grow l2"><span>Efectivo / otras &rarr; sin debito</span><span>${money(T.cancOtra)}</span></div>` : ``}
    </div>
    <div class="grupo">
      <div class="ghdr"><span>Pagos realizados &middot; Depositos (&minus;)</span><span class="gt">${money(T.pagos)}</span></div>
    </div>
    <div class="leyenda">(+) Entradas: suman &middot; (&minus;) Abonos/Liquidaciones: reducen el saldo a depositar. <b>Cheques acreditados</b> = "Credited Checks": es un abono, <b>no</b> un ingreso. Toda transaccion <b>TCD</b> tiene efecto neto CERO: al alta se resta como Credito, al cancelarse se suma como Debito.</div>
  </div>
  <div class="sec">
    <h2><span>Cancelaciones <span class="cnt">(${P.CANC.length} mov.)</span></span><span class="tot">${money(T.canc)}</span></h2>
    ${cancBloques(P.CANC)}
  </div>
  <div class="sec">
    <h2><span>Cheques acreditados <span class="cnt">(${P.CHEQUES.length} mov. &middot; abono, no es ingreso)</span></span><span class="tot">${money(T.cheques)}</span></h2>
    ${tablaTipoA(P.CHEQUES)}
  </div>
  <div class="sec">
    <h2><span>Depositos (Pagos realizados) <span class="cnt">(${P.PAGOS.length} mov.)</span></span><span class="tot">${money(T.pagos)}</span></h2>
    ${tablaPagos(P.PAGOS)}
  </div>
  <div class="sec">
    <h2><span>Ventas <span class="cnt">(${P.VENTAS.length} mov.)</span></span><span class="tot">${money(T.ventas)}</span></h2>
    ${ventasBloques(P.VENTAS)}
  </div>
  `;
}
(function(){
  const p=readPayload();
  if(p){ render(p); }
  else { render({H:DEMO_H,VENTAS:DEMO_VENTAS,SALIDAS:DEMO_SALIDAS,CHEQUES:DEMO_CHEQUES,CANC:DEMO_CANC,PAGOS:DEMO_PAGOS}); }
  if(new URLSearchParams(location.search).get("p")==="1"){ setTimeout(()=>window.print(),400); }
})();
window.addEventListener("hashchange",()=>{const p=readPayload(); if(p) render(p);});
</script>
</body>
</html>
