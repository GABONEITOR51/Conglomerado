<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte de Proveedor (lite) · 805 MultiServices</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#fff;
    color:#000;
    font-family:"Courier New",Consolas,monospace;
    font-size:11px;
    line-height:1.3;
  }
  .sheet{
    width:100%;
    max-width:8.5in;
    margin:0 auto;
    padding:0.35in;
  }
  h1{font-size:14px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.5px}
  .sub{font-size:11px;margin:0 0 10px}
  .totals{margin:0 0 14px;border-top:1px solid #000;border-bottom:1px solid #000;padding:4px 0}
  .totals div{display:flex;justify-content:space-between}
  .sec{margin-bottom:14px;break-inside:avoid}
  .sec h2{
    font-size:12px;margin:0;padding:2px 0;
    border-bottom:1px solid #000;text-transform:uppercase;
  }
  .sec .cnt{font-weight:normal;font-size:10px}
  table{width:100%;border-collapse:collapse;margin-top:2px}
  th,td{padding:1px 3px;text-align:left;vertical-align:top;border-bottom:1px dotted #999}
  th{font-weight:bold;border-bottom:1px solid #000}
  td.r,th.r{text-align:right;white-space:nowrap}
  .empty{padding:4px 0;font-style:italic}
  .print-btn{
    position:fixed;right:14px;bottom:14px;
    background:#000;color:#fff;border:none;border-radius:4px;
    padding:8px 14px;font-size:12px;cursor:pointer;
  }
  @page{size:letter portrait;margin:0.35in}
  @media print{
    .print-btn{display:none}
    thead{display:table-header-group}
    tr{break-inside:avoid}
    .sec{break-inside:avoid}
  }
</style>
</head>
<body>
<div class="sheet" id="sheet"></div>
<button class="print-btn" onclick="window.print()">Imprimir / PDF</button>
<script>
/* Mismo contrato de datos que reporte_proveedor.html (compatible con la misma Action de AppSheet):
   #d=HEADER||VENTAS||SALIDAS||CHEQUES||CANCELACIONES||PAGOS
   sec sep: ||   fila sep: ~~   campo sep: ^
   HEADER: 0 proveedor 1 fechaIni 2 fechaFin 3 logoURL(ignorado) 4 totVentas 5 totSalidas 6 totCheques 7 totCanc 8 totPagos 9 generadoPor
   VENTAS/SALIDAS/CHEQUES/CANC: 0 fecha 1 hora 2 cliente 3 servicio 4 formaPago 5 monto 6 observacion
   PAGOS: 0 fecha 1 referencia 2 monto 3 formaPago 4 observacion */
const SEC='||', REC='~~', F='^';

const DEMO_H = ["VIAMERICAS","26/4/2026","6/6/2026","","5240.00","1612.00","300.00","190.00","4950.00","805 MultiServices"];
const DEMO_VENTAS=[["6/26/2026","12:37 PM","NAYELI SAUCEDA GUERRERO","ENVIO/BILL","EFECTIVO","1757",""]];
const DEMO_SALIDAS=[["7/7/2026","19:54","RAFAEL GONZALEZ CHAVEZ","CHEQUE","EFECTIVO","151",""]];
const DEMO_CHEQUES=[["7/7/2026","19:54","RAFAEL GONZALEZ CHAVEZ","CHEQUE","EFECTIVO","151.07",""]];
const DEMO_CANC=[["6/22/2026","4:15 PM","CELSO SANTIAGO APOLINAR","CANCELACION / PAYOUT","EFECTIVO","190","cancelacion"]];
const DEMO_PAGOS=[["26/4/2026","PAGO-000123","2450.00","TRANSFERENCIA",""]];

function smartDecode(raw){
  let s=raw;
  try{ s=decodeURIComponent(raw); }catch(e){ s=raw; }
  if(s.indexOf(SEC)===-1 && /%[0-9A-Fa-f]{2}/.test(s)){
    try{ s=decodeURIComponent(s); }catch(e){}
  }
  return s;
}
function splitRows(sectionStr){
  const t=(sectionStr||"").trim();
  if(!t) return [];
  return t.split(REC).map(s=>s.trim()).filter(s=>s!=="").map(r=>r.split(F));
}
function readPayload(){
  let raw="";
  const h=location.hash||"";
  if(h.indexOf("#d=")===0) raw=h.slice(3);
  else if(new URLSearchParams(location.search).get("d")) raw=new URLSearchParams(location.search).get("d");
  if(!raw) return null;
  raw=smartDecode(raw);
  const parts=raw.split(SEC);
  const H=(parts[0]||"").split(F);
  return {
    H,
    VENTAS: splitRows(parts[1]),
    SALIDAS: splitRows(parts[2]),
    CHEQUES: splitRows(parts[3]),
    CANC: splitRows(parts[4]),
    PAGOS: splitRows(parts[5])
  };
}
function toNum(v){
  if(v===undefined||v===null) return 0;
  const n=parseFloat((""+v).replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:n;
}
function money(v){return "$"+toNum(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return (s==null?"":""+s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function tablaTipoA(rows){
  if(!rows.length) return `<div class="empty">Sin movimientos</div>`;
  const trs=rows.map(r=>`<tr>
    <td>${esc(r[0]||'')} ${esc(r[1]||'')}</td>
    <td>${esc(r[2]||'')}</td>
    <td>${esc(r[3]||'')}</td>
    <td>${esc(r[4]||'')}</td>
    <td class="r">${money(r[5])}</td>
    <td>${esc(r[6]||'')}</td>
  </tr>`).join("");
  return `<table>
    <thead><tr><th>Fecha/Hora</th><th>Cliente</th><th>Servicio</th><th>F.Pago</th><th class="r">Monto</th><th>Obs.</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}
function tablaPagos(rows){
  if(!rows.length) return `<div class="empty">Sin pagos registrados</div>`;
  const trs=rows.map(r=>`<tr>
    <td>${esc(r[0]||'')}</td>
    <td>${esc(r[1]||'')}</td>
    <td>${esc(r[3]||'')}</td>
    <td class="r">${money(r[2])}</td>
    <td>${esc(r[4]||'')}</td>
  </tr>`).join("");
  return `<table>
    <thead><tr><th>Fecha</th><th>Referencia</th><th>F.Pago</th><th class="r">Monto</th><th>Obs.</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}
function pad2(n){n=parseInt(n,10)||0; return (n<10?'0':'')+n;}
function fileDate(s){
  s=(""+(s||'')).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return s.replace(/[^\w-]/g,'');
  return pad2(m[1])+'-'+pad2(m[2])+'-'+m[3];
}
function fileProv(s){
  s=(""+(s||'')).trim();
  const t=s.replace(/[^A-Za-zÀ-ÿ]/g,'').slice(0,3);
  return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase();
}
function render(P){
  const H=P.H, g=i=>H[i]!==undefined?H[i]:"";
  document.title = `${fileProv(g(0))}_${fileDate(g(1))}_${fileDate(g(2))}`;
  document.getElementById("sheet").innerHTML=`
  <h1>Reporte de proveedor: ${esc(g(0)||'PROVEEDOR')}</h1>
  <div class="sub">805 MultiServices &middot; Periodo: ${esc(g(1))} a ${esc(g(2))} &middot; Generado por: ${esc(g(9)||'-')}</div>
  <div class="totals">
    <div><span>Ventas</span><span>${money(g(4))}</span></div>
    <div><span>Salidas</span><span>${money(g(5))}</span></div>
    <div><span>Cheques</span><span>${money(g(6))}</span></div>
    <div><span>Cancelaciones</span><span>${money(g(7))}</span></div>
    <div><span>Pagos realizados</span><span>${money(g(8))}</span></div>
  </div>

  <div class="sec">
    <h2>Salidas <span class="cnt">(${P.SALIDAS.length} mov. &middot; ${money(g(5))})</span></h2>
    ${tablaTipoA(P.SALIDAS)}
  </div>
  <div class="sec">
    <h2>Cancelaciones <span class="cnt">(${P.CANC.length} mov. &middot; ${money(g(7))})</span></h2>
    ${tablaTipoA(P.CANC)}
  </div>
  <div class="sec">
    <h2>Cheques <span class="cnt">(${P.CHEQUES.length} mov. &middot; ${money(g(6))})</span></h2>
    ${tablaTipoA(P.CHEQUES)}
  </div>
  <div class="sec">
    <h2>Depositos (Pagos realizados) <span class="cnt">(${P.PAGOS.length} mov. &middot; ${money(g(8))})</span></h2>
    ${tablaPagos(P.PAGOS)}
  </div>
  <div class="sec">
    <h2>Ventas <span class="cnt">(${P.VENTAS.length} mov. &middot; ${money(g(4))})</span></h2>
    ${tablaTipoA(P.VENTAS)}
  </div>
  `;
}
(function(){
  const p=readPayload();
  if(p){ render(p); }
  else { render({H:DEMO_H,VENTAS:DEMO_VENTAS,SALIDAS:DEMO_SALIDAS,CHEQUES:DEMO_CHEQUES,CANC:DEMO_CANC,PAGOS:DEMO_PAGOS}); }
  if(new URLSearchParams(location.search).get("p")==="1"){ setTimeout(()=>window.print(),400); }
})();
window.addEventListener("hashchange",()=>{const p=readPayload(); if(p) render(p);});
</script>
</body>
</html>
