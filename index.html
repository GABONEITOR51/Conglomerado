<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte de Proveedor (lite) · 805 MultiServices</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#fff;
    color:#000;
    font-family:"Courier New",Consolas,monospace;
    font-size:11px;
    line-height:1.3;
  }
  .sheet{
    width:100%;
    max-width:8.5in;
    margin:0 auto;
    padding:0.35in;
  }
  h1{font-size:14px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.5px}
  .sub{font-size:11px;margin:0 0 10px}

  /* ==== STATEMENT VIAMERICAS (tabla superior, nombres del proveedor) ==== */
  .stmt{display:flex;border:1.5px solid #000;margin:0 0 6px;break-inside:avoid;
        -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stmt-col{flex:1;border-right:1px solid #000;min-width:0}
  .stmt-col:last-child{border-right:none}
  .stmt-h{text-align:center;font-weight:bold;font-size:12px;padding:5px 4px;
          border-bottom:1.5px solid #000;letter-spacing:.3px}
  .stmt-col.bal .stmt-h{color:#8a8a8a}
  .stmt table{width:100%;border-collapse:collapse;margin:0;table-layout:fixed}
  .stmt td{padding:3px 8px;font-size:11px;vertical-align:baseline;border:none}
  .stmt td.c{text-align:left;white-space:normal;word-break:break-word}
  .stmt td.n{text-align:right;width:30px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .stmt td.a{text-align:right;width:88px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .stmt tr.bold td{font-weight:bold}
  .stmt tr.sep td{border-top:1px solid #000}
  .stmt tr.red td{color:#d00}
  .stmt tr.hl td{background:#dbe7ff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stmt-note{font-size:9px;font-style:italic;margin:0 0 14px;line-height:1.3}
  /* ===================================================================== */

  .groups{margin:0 0 14px}
  .grupo{border:1.5px solid #000;margin-bottom:7px;break-inside:avoid}
  .grupo .ghdr{display:flex;justify-content:space-between;align-items:baseline;
    background:#e6e6e6;padding:3px 6px;font-weight:bold;font-size:12px;
    text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #000;
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .grupo .ghdr .gt{font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  .grupo .grow{display:grid;grid-template-columns:1fr 120px;column-gap:12px;padding:1px 6px}
  .grupo .grow span:last-child{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .grupo .grow.l1 span:first-child{padding-left:10px}
  .grupo .grow.l2 span:first-child{padding-left:24px;font-size:10px}
  .grupo .grow.l2 span:last-child{font-size:10px}
  .leyenda{font-size:9px;font-style:italic;line-height:1.25;margin-top:1px}
  .sec{margin-bottom:14px;break-inside:avoid}
  .sec h2{
    font-size:12px;margin:0;padding:2px 0;
    border-bottom:1px solid #000;text-transform:uppercase;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .sec .cnt{font-weight:normal;font-size:10px}
  .sec h2 .tot{font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  .sec h3.sub2{
    font-size:11px;margin:7px 0 0;padding:1px 0;
    border-bottom:1px dashed #000;text-transform:uppercase;font-weight:bold;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .sec h3.sub2 .tot{font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  table{width:100%;border-collapse:collapse;margin-top:2px;table-layout:fixed}
  th,td{padding:1px 3px;text-align:left;vertical-align:top;border-bottom:1px dotted #999;
        overflow:hidden;text-overflow:ellipsis}
  th{font-weight:bold;border-bottom:1px solid #000}
  td.r,th.r{text-align:right;white-space:nowrap}
  td.nw,th.nw{white-space:nowrap}
  td.name{white-space:normal;word-break:break-word}
  .empty{padding:4px 0;font-style:italic}
  .print-btn{
    position:fixed;right:14px;bottom:14px;
    background:#000;color:#fff;border:none;border-radius:4px;
    padding:8px 14px;font-size:12px;cursor:pointer;
  }
  @page{size:letter portrait;margin:0.35in}
  @media print{
    .print-btn{display:none}
    thead{display:table-header-group}
    tr{break-inside:avoid}
    .sec{break-inside:avoid}
  }
</style>
</head>
<body>
<div class="sheet" id="sheet"></div>
<button class="print-btn" onclick="window.print()">Imprimir / PDF</button>
<script>
/* Mismo contrato de datos que reporte_proveedor.html (compatible con la misma Action de AppSheet):
   #d=HEADER||VENTAS||SALIDAS||CHEQUES||CANCELACIONES||PAGOS
   sec sep: ||   fila sep: ~~   campo sep: ^
   HEADER: 0 proveedor 1 fechaIni 2 fechaFin 3 logoURL(ignorado) 4 totVentas 5 totSalidas 6 totCheques 7 totCanc 8 totPagos 9 generadoPor
           10 balanceInicial (saldo final del mes anterior)  [NUEVO, opcional]
           11 debitos        (ajustes / debitos del statement) [NUEVO, opcional]
   VENTAS/SALIDAS/CHEQUES/CANC: 0 fecha 1 hora 2 cliente 3 servicio 4 formaPago 5 monto 6 observacion 7 tipoEnvio
   PAGOS: 0 fecha 1 referencia 2 monto 3 formaPago 4 observacion
   MAPEO CON EL STATEMENT DE VIAMERICAS (seccion Balance) -- para referencia contable:
     ENTRADAS (+, suman al saldo):
       Ventas . Envios (Money Transfer)  = "Money Transfers"
       Ventas . Pago de biles            = "Bill Payment" (Other services)
       Ventas . Creditos                 = venta pagada por el cliente directo con tarjeta
                                           (cuenta como venta y ademas se descuenta como "Credits")
     ABONOS / LIQUIDACIONES (-, reducen el saldo a depositar, NO son ingresos):
       Cheques acreditados = "Credited Checks"  (confirmado por el usuario)
       Cancelaciones       ~ "Money Transfers - Canceled"
       Pagos / Depositos   = "Deposits / ViaSafe"
     Formula VIA: Balance inicial + Money Transfers + Other services + Debits
                  - Credited checks - Deposits/ViaSafe - Credits = Total a depositar
   NOTA v2: los totales del encabezado se recalculan en JS a partir de los movimientos reales
            (ya no se confia en los valores 4/5/6/7/8 del HEADER de AppSheet).
   NOTA v19: se agrega la tabla superior "Statement Viamericas" con los NOMBRES del proveedor.
            Las filas SIN fuente de datos en el reporte (Anulados, Pago de Envios, Biles
            Internacionales, Biles Cancelados, Money Orders, Recargas, Recargas Canceladas,
            Balance Inicial y Debitos) se muestran en $0.00 y en ROJO para editarlas a mano. */
const SEC='||', REC='~~', F='^';
const DEMO_H = ["VIAMERICAS","26/4/2026","6/6/2026","","5240.00","1612.00","300.00","190.00","4950.00","805 MultiServices"];
const DEMO_VENTAS=[
  ["6/26/2026","12:37 PM","NAYELI SAUCEDA GUERRERO","ENVIO/","EFECTIVO","1757","","Money Transfer"],
  ["6/27/2026","1:10 PM","JUAN PEREZ LOPEZ","BILL","DEBITO","243","","Bill Paymnt"],
  ["6/28/2026","9:20 AM","MARIA LOPEZ CRUZ","ENVIO/","PAGO DIRECTO CLIENTE A COMPANIA CARD","900","","Money Transfer"]
];
const DEMO_SALIDAS=[["7/7/2026","19:54","RAFAEL GONZALEZ CHAVEZ","CHEQUE","EFECTIVO","151",""]];
const DEMO_CHEQUES=[["7/7/2026","19:54","RAFAEL GONZALEZ CHAVEZ","CHEQUE","EFECTIVO","151.07",""]];
const DEMO_CANC=[
  ["6/22/2026","4:15 PM","CELSO SANTIAGO APOLINAR","CANCELACION / PAYOUT","EFECTIVO","190","cancelacion"],
  ["6/23/2026","5:30 PM","ROSA MARTINEZ DIAZ","CANCELACION","PAGO DIRECTO CLIENTE A COMPANIA CARD","310","reembolso"]
];
const DEMO_PAGOS=[["26/4/2026","PAGO-000123","2450.00","TRANSFERENCIA",""]];
function smartDecode(raw){
  let s=raw;
  try{ s=decodeURIComponent(raw); }catch(e){ s=raw; }
  if(s.indexOf(SEC)===-1 && /%[0-9A-Fa-f]{2}/.test(s)){
    try{ s=decodeURIComponent(s); }catch(e){}
  }
  return s;
}
function splitRows(sectionStr){
  const t=(sectionStr||"").trim();
  if(!t) return [];
  return t.split(REC).map(s=>s.trim()).filter(s=>s!=="").map(r=>r.split(F));
}
function readPayload(){
  let raw="";
  const h=location.hash||"";
  if(h.indexOf("#d=")===0) raw=h.slice(3);
  else if(new URLSearchParams(location.search).get("d")) raw=new URLSearchParams(location.search).get("d");
  if(!raw) return null;
  raw=smartDecode(raw);
  const parts=raw.split(SEC);
  const H=(parts[0]||"").split(F);
  return {
    H,
    VENTAS: splitRows(parts[1]),
    SALIDAS: splitRows(parts[2]),
    CHEQUES: splitRows(parts[3]),
    CANC: splitRows(parts[4]),
    PAGOS: splitRows(parts[5])
  };
}
function toNum(v){
  if(v===undefined||v===null) return 0;
  const n=parseFloat((""+v).replace(/[^0-9.\-]/g,""));
  return isNaN(n)?0:n;
}
/* Suma el campo idx de todas las filas -> total real del bloque */
function sumRows(rows,idx){
  if(!rows||!rows.length) return 0;
  return rows.reduce((a,r)=>a+toNum(r[idx]),0);
}
function money(v){return "$"+toNum(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
/* Igual que money() pero con el signo menos ANTES del $ y SIN centavos (statement: -$5,100).
   Si el valor es 0 devuelve "" (celda en blanco). */
function money2(v){
  const n=Math.round(toNum(v));
  if(n===0) return "";
  return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
}
function esc(s){return (s==null?"":""+s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
/* Quita apostrofe/comilla que Google Sheets antepone a campos de texto */
function stripQuote(s){return (s==null?"":(""+s)).replace(/^['`´‘’]+/,'').trim();}
/* Limpia fecha/hora: elimina TODO caracter inicial que no sea digito
   (apostrofe ', coma ',' , comillas, espacios, etc. que antepone Sheets) */
function cleanDT(s){return (s==null?"":(""+s)).replace(/^[^\d]+/,'').trim();}
/* Nombre + observacion en una sola celda: "NOMBRE / obs" si existe obs */
function nameObs(name,obs){
  const n=esc(name||'');
  const o=(obs==null?'':(''+obs)).trim();
  return o ? n+' / '+esc(o) : n;
}
/* Recorta a n caracteres (para Servicio y Forma de pago) */
function cut(s,n){s=stripQuote(s); return s.length>n?s.slice(0,n):s;}
/* Colgroup compartido: mas espacio a Cliente, columnas Servicio/F.Pago angostas */
const COLS_A=`<colgroup>
  <col style="width:18%">
  <col style="width:53%">
  <col style="width:9%">
  <col style="width:8%">
  <col style="width:12%">
</colgroup>`;
function tablaTipoA(rows){
  if(!rows.length) return `<div class="empty">Sin movimientos</div>`;
  const trs=rows.map(r=>`<tr>
    <td class="nw">${esc(cleanDT(r[0]))} ${esc(cleanDT(r[1]))}</td>
    <td class="name">${nameObs(r[2],r[6])}</td>
    <td class="nw">${esc(cut(r[3],6))}</td>
    <td class="nw">${esc(cut(r[4],5))}</td>
    <td class="r">${money(r[5])}</td>
  </tr>`).join("");
  return `<table>
    ${COLS_A}
    <thead><tr><th class="nw">Fecha/Hora</th><th>Cliente / Obs.</th><th>Servicio</th><th>F.Pago</th><th class="r">Monto</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}
/* Forma de pago "TCD" = PAGO DIRECTO CLIENTE A COMPANIA (CARD):
   el cliente paga con su propia tarjeta en la terminal del proveedor.
   -> En Ventas es un CREDITO; en Cancelaciones es "Debito por cancelacion de tarjeta".
   Reconoce el codigo "TCD" y tambien la descripcion larga (por si el payload manda el texto). */
function esTCD(fp){
  fp=(fp==null?'':(''+fp)).toLowerCase();
  return /\btcd\b|pago directo cliente|cliente\s*directo|directo a compa/.test(fp);
}
/* Clasifica una fila de Ventas.
   PRIORIDAD 1: forma de pago TCD -> credito.
   Luego por [TipoEnvio] (indice 7): Money Transfer / Bill Paymnt. */
function ventaTipo(r){
  if(esTCD(r[4])) return 'credito';
  const t=(r[7]==null?'':(''+r[7])).toLowerCase();
  if(/bill/.test(t)) return 'bill';
  if(/money|transfer|env[ií]o/.test(t)) return 'envio';
  return t.trim()==='' ? '' : 'otro';
}
/* Clasifica el PRODUCTO de una venta para el statement (independiente de la forma de pago).
   Un envio pagado con tarjeta (TCD) sigue siendo un "Money Transfer" y ademas se descuenta
   aparte como "Credito". Usa [TipoEnvio] (idx 7) y, como respaldo, el [Servicio] (idx 3). */
function prodTipo(r){
  /* Clasifica por PRODUCTO usando SOLO [TipoEnvio] (idx 7).
     OJO: el [Servicio] (idx 3) llega como "ENVIO/" para TODO (envios, biles y
     creditos), asi que NO sirve para distinguir; incluirlo mandaba todo a un lado.
     Regla: si TipoEnvio dice "bill" -> Bill Payment; cualquier otra cosa -> Money
     Transfer (incluye los envios pagados con tarjeta, que asi entran a "Envios De
     Dinero" tal como los cuenta el statement de Viamericas). */
  const t=(''+(r[7]||'')).toLowerCase();
  if(/bill/.test(t)) return 'bill';
  return 'envio';
}
/* Clasifica una Cancelacion: forma de pago TCD -> "Debito por cancelacion de tarjeta" */
function cancTipo(r){
  return esTCD(r[4]) ? 'tarjeta' : 'otra';
}
/* Sub-bloque titulado con contador y subtotal (para separar Ventas) */
function subBloque(titulo,rows){
  return `<h3 class="sub2"><span>${titulo} <span class="cnt">(${rows.length} mov.)</span></span><span class="tot">${money(sumRows(rows,5))}</span></h3>${tablaTipoA(rows)}`;
}
/* Divide Ventas en Envios (Money Transfer) vs Pago de biles (Bill Payment).
   Si aun no llega el campo TipoEnvio en el payload, muestra la tabla unica (compatibilidad). */
function ventasBloques(rows){
  const env =rows.filter(r=>ventaTipo(r)==='envio');
  const bil =rows.filter(r=>ventaTipo(r)==='bill');
  const cred=rows.filter(r=>ventaTipo(r)==='credito');
  const otr =rows.filter(r=>{const k=ventaTipo(r);return k!=='envio'&&k!=='bill'&&k!=='credito';});
  if(env.length===0 && bil.length===0 && cred.length===0) return tablaTipoA(rows);
  let html=subBloque('Envios (Money Transfer)',env)+subBloque('Pago de biles (Bill Payment)',bil);
  if(cred.length) html+=subBloque('Creditos (cliente directo a compania)',cred);
  if(otr.length)  html+=subBloque('Otros / sin clasificar',otr);
  return html;
}
/* Divide Cancelaciones: Debito por cancelacion de tarjeta vs efectivo/otras.
   Si no hay canceladas con tarjeta, muestra tabla unica. */
function cancBloques(rows){
  const tar=rows.filter(r=>cancTipo(r)==='tarjeta');
  const otr=rows.filter(r=>cancTipo(r)==='otra');
  if(tar.length===0) return tablaTipoA(rows);
  let html=subBloque('Debito por cancelacion de tarjeta',tar);
  if(otr.length) html+=subBloque('Cancelaciones (efectivo / otras)',otr);
  return html;
}
function tablaPagos(rows){
  if(!rows.length) return `<div class="empty">Sin pagos registrados</div>`;
  const trs=rows.map(r=>`<tr>
    <td class="nw">${esc(cleanDT(r[0]))}</td>
    <td class="name">${nameObs(r[1],r[4])}</td>
    <td class="nw">${esc(cut(r[3],5))}</td>
    <td class="r">${money(r[2])}</td>
  </tr>`).join("");
  return `<table>
    <colgroup>
      <col style="width:18%"><col style="width:62%"><col style="width:8%"><col style="width:12%">
    </colgroup>
    <thead><tr><th class="nw">Fecha</th><th>Referencia / Obs.</th><th>F.Pago</th><th class="r">Monto</th></tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

/* ================= STATEMENT VIAMERICAS (tabla superior) =================
   Fila de columna con CANTIDAD + MONTO (Envios De Dinero / Otros Servicios). */
function stRowA(concepto,cant,monto,cls){
  cls=cls||'';
  const c=(cant===null||cant===undefined||cant===0)?'':(''+cant);
  return `<tr class="${cls}"><td class="c">${concepto}</td><td class="n">${c}</td><td class="a">${money2(monto)}</td></tr>`;
}
/* Fila de columna Balance: solo CONCEPTO + MONTO. */
function stRowB(concepto,monto,cls){
  cls=cls||'';
  return `<tr class="${cls}"><td class="c">${concepto}</td><td class="a">${money2(monto)}</td></tr>`;
}
/* Construye la tabla del statement con los NOMBRES del proveedor (Viamericas).
   Rojo = fila sin fuente de datos en el reporte (editar a mano). */
function statementTable(P,T,balIni,balIniSet,debitos,debSet){
  /* ---- Columna 1: Envios De Dinero (Money Transfers) ---- */
  const envN=T.mtCount, envA=T.mtSum;                  // Money Transfers: INCLUYE TCD (validado vs statement)
  const canN=P.CANC.length, canA=T.canc;               // cancelaciones (todas; el payload no separa MT/bile)
  const subN=envN-canN, subA=envA-canA;                 // subtotal (anulados = 0)
  const totN=subN, totA=subA;                           // total columna 1 (pago de envios = 0)
  /* ---- Columna 2: Otros Servicios ---- */
  const bilN=T.billCount, bilA=T.billSum;              // Bill Payment: INCLUYE TCD (validado vs statement)
  const otrTotN=bilN, otrTotA=bilA;                     // total columna 2 (resto = 0 sin fuente)
  /* ---- Columna 3: Balance ----
     Formula VIA (validada, cuadra a $975.68 en mayo y $4,896.52 en junio):
       Inicial + MoneyTransfers + OtherServices + Debitos
       - CreditedChecks - Deposits/ViaSafe - Credits
     Creditos = grupo "Creditos (cliente directo a compania)" del reporte (se resta). */
  const bEnv=totA, bOtr=otrTotA;
  const bChq=-T.cheques, bDep=-T.pagos, bCred=-T.ventasCred, bDeb=toNum(debitos);
  const bTot=toNum(balIni)+bEnv+bOtr+bChq+bDep+bDeb+bCred;

  const col1=`<div class="stmt-col">
    <div class="stmt-h">Envíos De Dinero</div>
    <table>
      ${stRowA('Envíos De Dinero',envN,envA)}
      ${stRowA('Envíos De Dinero - Cancelados',canN?(-canN):0,-canA)}
      ${stRowA('Envíos De Dinero - Anulados',0,0,'red')}
      ${stRowA('Subtotal',subN,subA,'bold sep')}
      ${stRowA('Pago de Envíos',0,0,'red')}
      ${stRowA('Total',totN,totA,'bold sep')}
    </table>
  </div>`;
  const col2=`<div class="stmt-col">
    <div class="stmt-h">Otros Servicios</div>
    <table>
      ${stRowA('Pago de Biles',bilN,bilA)}
      ${stRowA('Pago de Biles Int.',0,0,'red')}
      ${stRowA('Pagos de Biles Cancelados',0,0,'red')}
      ${stRowA('Money Orders',0,0,'red')}
      ${stRowA('Recargas / Pin',0,0,'red')}
      ${stRowA('Recargas Canceladas',0,0,'red')}
      ${stRowA('Total',otrTotN,otrTotA,'bold sep')}
    </table>
  </div>`;
  const col3=`<div class="stmt-col bal">
    <div class="stmt-h">Balance</div>
    <table>
      ${stRowB('Balance Inicial',balIni,balIniSet?'':'red')}
      ${stRowB('Envíos De Dinero',bEnv)}
      ${stRowB('Otros Servicios',bOtr)}
      ${stRowB('Cheques Acreditados',bChq)}
      ${stRowB('Depósitos / Viasafe',bDep,'hl')}
      ${stRowB('Débitos',bDeb,debSet?'':'red')}
      ${stRowB('Créditos',bCred)}
      ${stRowB('Total',bTot,'bold sep')}
    </table>
  </div>`;
  return `<div class="stmt">${col1}${col2}${col3}</div>
  <div class="stmt-note">Statement de proveedor (Viamericas). <b style="color:#d00">Valores en rojo</b> = sin dato en el reporte: editar manualmente. Balance Inicial = saldo final del mes anterior. Cheques Acreditados y Depósitos/Viasafe son abonos (restan al saldo a depositar).</div>`;
}
/* ======================================================================== */

function pad2(n){n=parseInt(n,10)||0; return (n<10?'0':'')+n;}
function fileDate(s){
  s=cleanDT(s);
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return s.replace(/[^\w-]/g,'');
  return pad2(m[1])+'-'+pad2(m[2])+'-'+m[3];
}
function fileProv(s){
  s=(""+(s||'')).trim();
  const t=s.replace(/[^A-Za-zÀ-ÿ]/g,'').slice(0,3);
  return t.charAt(0).toUpperCase()+t.slice(1).toLowerCase();
}
function render(P){
  const H=P.H, g=i=>H[i]!==undefined?H[i]:"";
  /* Totales reales calculados desde los movimientos (fix de encabezado) */
  const T={
    ventas:  sumRows(P.VENTAS,5),
    ventasEnv:  sumRows(P.VENTAS.filter(r=>ventaTipo(r)==='envio'),5),
    ventasBil:  sumRows(P.VENTAS.filter(r=>ventaTipo(r)==='bill'),5),
    ventasCred: sumRows(P.VENTAS.filter(r=>ventaTipo(r)==='credito'),5),
    salidas: sumRows(P.SALIDAS,5),
    cheques: sumRows(P.CHEQUES,5),
    canc:    sumRows(P.CANC,5),
    cancTar: sumRows(P.CANC.filter(r=>cancTipo(r)==='tarjeta'),5),
    cancOtra:sumRows(P.CANC.filter(r=>cancTipo(r)==='otra'),5),
    pagos:   sumRows(P.PAGOS,2)
  };
  /* VALIDADO contra los statements reales de Viamericas MAYO y JUNIO 2026:
     La linea "Envios De Dinero" (Money Transfers) INCLUYE los envios pagados con
     tarjeta, y esos mismos montos se RESTAN en "Creditos". Prueba a nivel transaccion:
       - Mayo:  A28934-1440 ($1,522.50) aparece en Envios De Dinero Y en Creditos.
       - Junio: 23 transacciones (1535,1540,...,1657) aparecen en ambas secciones.
     Ambos Balances cuadran solo de esa forma ($975.68 mayo, $4,896.52 junio).
     Por eso se clasifica por PRODUCTO (prodTipo, campo [TipoEnvio]), NO por forma de pago:
       Envios De Dinero = TODOS los money transfer (incluye los pagados con tarjeta)
       Pago de Biles    = TODOS los bill payment
       Creditos         = lo pagado con tarjeta, se resta en el Balance */
  const mtRows  =P.VENTAS.filter(r=>prodTipo(r)==='envio');
  const billRows=P.VENTAS.filter(r=>prodTipo(r)==='bill');
  T.mtCount=mtRows.length;     T.mtSum=sumRows(mtRows,5);
  T.billCount=billRows.length; T.billSum=sumRows(billRows,5);
  /* Balance Inicial (idx 10) y Debitos (idx 11): opcionales en el HEADER.
     Si no llegan -> 0 y se pintan en ROJO (editar a mano). */
  const balIniSet = H[10]!==undefined && (''+H[10]).trim()!=='';
  const balIni    = toNum(H[10]);
  const debSet    = H[11]!==undefined && (''+H[11]).trim()!=='';
  const debitos   = toNum(H[11]);

  document.title = `${fileProv(g(0))}_${fileDate(g(1))}_${fileDate(g(2))}`;
  document.getElementById("sheet").innerHTML=`
  <h1>Reporte de proveedor: ${esc(g(0)||'PROVEEDOR')}</h1>
  <div class="sub">805 MultiServices &middot; Periodo: ${esc(cleanDT(g(1)))} a ${esc(cleanDT(g(2)))} &middot; Generado por: ${esc(g(9)||'-')} &middot; v25</div>
  ${statementTable(P,T,balIni,balIniSet,debitos,debSet)}
  <div class="groups">
    <div class="grupo">
      <div class="ghdr"><span>Entradas &middot; Ventas (+)</span><span class="gt">${money(T.ventas)}</span></div>
      <div class="grow l1"><span>Envios (Money Transfer)</span><span>${money(T.ventasEnv)}</span></div>
      <div class="grow l1"><span>Pago de biles (Bill Payment)</span><span>${money(T.ventasBil)}</span></div>
      ${T.ventasCred>0 ? `<div class="grow l1"><span>Creditos (cliente directo)</span><span>${money(T.ventasCred)}</span></div>` : ``}
    </div>
    <div class="grupo">
      <div class="ghdr"><span>Salidas &middot; Abonos (&minus;)</span><span class="gt">${money(T.salidas)}</span></div>
      <div class="grow l1"><span>Cheques acreditados</span><span>${money(T.cheques)}</span></div>
      <div class="grow l1"><span>Cancelaciones</span><span>${money(T.canc)}</span></div>
      ${T.cancTar>0 ? `
      <div class="grow l2"><span>Debito por cancelacion de tarjeta</span><span>${money(T.cancTar)}</span></div>
      <div class="grow l2"><span>Cancelaciones (efectivo / otras)</span><span>${money(T.cancOtra)}</span></div>` : ``}
    </div>
    <div class="grupo">
      <div class="ghdr"><span>Pagos realizados &middot; Depositos (&minus;)</span><span class="gt">${money(T.pagos)}</span></div>
    </div>
    <div class="leyenda">(+) Entradas: suman &middot; (&minus;) Abonos/Liquidaciones: reducen el saldo a depositar. <b>Cheques acreditados</b> = "Credited Checks" del proveedor: es un abono, <b>no</b> un ingreso.</div>
  </div>
  <div class="sec">
    <h2><span>Cancelaciones <span class="cnt">(${P.CANC.length} mov.)</span></span><span class="tot">${money(T.canc)}</span></h2>
    ${cancBloques(P.CANC)}
  </div>
  <div class="sec">
    <h2><span>Cheques acreditados <span class="cnt">(${P.CHEQUES.length} mov. &middot; abono, no es ingreso)</span></span><span class="tot">${money(T.cheques)}</span></h2>
    ${tablaTipoA(P.CHEQUES)}
  </div>
  <div class="sec">
    <h2><span>Depositos (Pagos realizados) <span class="cnt">(${P.PAGOS.length} mov.)</span></span><span class="tot">${money(T.pagos)}</span></h2>
    ${tablaPagos(P.PAGOS)}
  </div>
  <div class="sec">
    <h2><span>Ventas <span class="cnt">(${P.VENTAS.length} mov.)</span></span><span class="tot">${money(T.ventas)}</span></h2>
    ${ventasBloques(P.VENTAS)}
  </div>
  `;
}
(function(){
  const p=readPayload();
  if(p){ render(p); }
  else { render({H:DEMO_H,VENTAS:DEMO_VENTAS,SALIDAS:DEMO_SALIDAS,CHEQUES:DEMO_CHEQUES,CANC:DEMO_CANC,PAGOS:DEMO_PAGOS}); }
  if(new URLSearchParams(location.search).get("p")==="1"){ setTimeout(()=>window.print(),400); }
})();
window.addEventListener("hashchange",()=>{const p=readPayload(); if(p) render(p);});
</script>
</body>
</html>
